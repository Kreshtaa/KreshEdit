<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KreshEdit — Universal Save Editor</title>
  <meta name="description" content="A free, browser-based save file editor for SugarCube, Twine, Ren'Py, HTML games, and more. Everything runs on your device - your saves never leave your browser." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://editor.kreshy.com/" />
  <meta property="og:title" content="KreshEdit — Universal Save Editor" />
  <meta property="og:description" content="A free, browser-based save file editor for SugarCube, Twine, Ren'Py, HTML games, and more. Everything runs on your device - your saves never leave your browser." />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:url" content="https://editor.kreshy.com/" />
  <meta name="twitter:title" content="KreshEdit — Universal Save Editor" />
  <meta name="twitter:description" content="A free, browser-based save file editor for SugarCube, Twine, Ren'Py, HTML games, and more. Everything runs on your device - your saves never leave your browser." />

  <!-- Canonical -->
  <link rel="canonical" href="https://editor.kreshy.com/" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "KreshEdit",
    "applicationCategory": "Utility",
    "operatingSystem": "Any (Web-based)",
    "url": "https://editor.kreshy.com",
    "description": "A free, browser-based save file editor for SugarCube, Twine, Ren'Py, HTML games, and more. Everything runs on your device - your saves never leave your browser.",
    "author": { "@type": "Person", "name": "Kresh" },
    "publisher": { "@type": "Person", "name": "Kresh" },
    "creator": { "@type": "Person", "name": "Kresh" },
    "alternateName": ["Kreshy", "Kreshtaa", "Kresh'taa"],
    "sameAs": [
      "https://kreshy.com",
      "https://github.com/Kreshtaa"
    ],
    "keywords": [
      "save editor", "save edit",
      "game save editor", "game save edit",
      "online save editor", "online save edit",
      "html save edit", "html save editor",
      "html5 save edit", "html5 save editor",
      "html5 game save editor", "html5 game save edit",
      "save file edit", "save file editor",
      "game save file edit", "game save file editor",
      "sugarcube save edit", "sugarcube save editor",
      "sugarcube save file edit", "sugarcube save file editor",
      "twine save edit", "twine save editor",
      "twine save file edit", "twine save file editor",
      "renpy save edit", "renpy save editor",
      "renpy save file edit", "renpy save file editor"
    ]
  }
  </script>

  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="scanlines" aria-hidden="true"></div>

  <header class="header">
    <div class="header-brand">
      <span class="brand-bracket">[</span>
      <span class="brand-name">KreshEdit</span>
      <span class="brand-bracket">]</span>
      <span class="brand-tag">universal save editor</span>
    </div>
    <div class="header-actions">
      <button id="btn-import" class="btn btn-primary" title="Load a save file from your computer">
        <span class="btn-icon">↑</span> Import Save
      </button>
      <button id="btn-export" class="btn btn-secondary" title="Download the edited save file">
        <span class="btn-icon">↓</span> Export Save
      </button>
    </div>
  </header>

  <main class="main">
    <div class="editor-wrap">
      <div class="editor-header">
        <span id="editor-filename" class="editor-filename">no file loaded</span>
        <span id="editor-module" class="editor-module"></span>
      </div>
      <textarea
        id="editor"
        class="editor"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        placeholder="// Import a save file to begin editing.
// Supported formats: SugarCube/Twine, Ren'Py, RPGMaker MV/MZ, Unity JSON, Unreal JSON, plain/base64 JSON.
//
// Back up your saves before editing!
//
// Your data never leaves this page — everything runs locally in your browser."
      ></textarea>
    </div>
  </main>

  <footer class="status-bar">
    <div id="status-msg" class="status-msg status-idle">Ready.</div>
    <div class="status-right">
      <span class="status-hint">All processing is local &amp; private.</span>
    </div>
  </footer>

  <input type="file" id="file-input" style="display:none" />

  <script src="./modules/_utils.js"></script>

  <script src="./modules/sugarcube.js"></script>
  <script src="./modules/rpgmaker_mv.js"></script>
  <script src="./modules/gzip_json.js"></script>
  <script src="./modules/renpy.js"></script>
  <script src="./modules/unity_json.js"></script>
  <script src="./modules/unreal_json.js"></script>
  <script src="./modules/lzstring.js"></script>
  <script src="./modules/html.js"></script>

  <script src="main.js"></script>

</body>
</html>
